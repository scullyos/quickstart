# Postgres login-stack for the multi-dialect e2e check (person/auth/bo-orc/FE).
# Standalone (not the vanilla mysql compose). Run with:
#   docker compose --env-file .env.pg -f docker-compose.pg.yml up -d
# Images: all from ghcr (release: person 0.0.62, auth 0.0.55, bo-orc 0.0.74, FE 0.0.57).
networks:
  scullyos:
    driver: bridge

volumes:
  pg-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - scullyos
    environment:
      POSTGRES_USER: ${MYSQL_APPUSER}
      POSTGRES_PASSWORD: ${MYSQL_APP_PASSWORD}
      POSTGRES_DB: ${MYSQL_DATABASE}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MYSQL_APPUSER} -d ${MYSQL_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  person-db-init:
    image: ghcr.io/scullyos/person-ms:0.0.64
    container_name: person-db-init
    restart: "no"
    networks:
      - scullyos
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/person.defaults.env
      - ./env/person.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      META_DB_DATABASE_NAME: postgres
      DB_USERNAME: ${MYSQL_APPUSER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_DATABASE_NAME: ${MYSQL_DATABASE}
      ROOT_DB_USERNAME: ${MYSQL_APPUSER}
      ROOT_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      SEED_USER_FIRST_NAME: ${SEED_USER_FIRST_NAME}
      SEED_USER_LAST_NAME: ${SEED_USER_LAST_NAME}
      SEED_USER_NAME: ${SEED_USER_NAME}
      SEED_USER_PROVIDER: ${SEED_USER_PROVIDER}
      BOOTSTRAP_ADMIN_PASSWORD: ${SEED_USER_PASSWORD}
    entrypoint: ["node", "/app/node_modules/@onthebits/core/dist/src/db/orm.exec.js", "--command", "migrate:run"]

  authorization-db-init:
    image: ghcr.io/scullyos/authorization-ms:0.0.56
    container_name: authorization-db-init
    restart: "no"
    networks:
      - scullyos
    depends_on:
      postgres:
        condition: service_healthy
      person-db-init:
        condition: service_completed_successfully
    env_file:
      - ./env/authorization.defaults.env
      - ./env/authorization.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      META_DB_DATABASE_NAME: postgres
      DB_USERNAME: ${MYSQL_APPUSER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_DATABASE_NAME: auth_db
      CASBIN_DB_SCHEMA: auth_db
      ROOT_DB_USERNAME: ${MYSQL_APPUSER}
      ROOT_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
    entrypoint: ["node", "/app/node_modules/@onthebits/core/dist/src/db/orm.exec.js", "--command", "migrate:run"]

  bo-orc-db-init:
    image: ghcr.io/scullyos/bo-orc-ms:0.0.76
    container_name: bo-orc-db-init
    restart: "no"
    networks:
      - scullyos
    depends_on:
      postgres:
        condition: service_healthy
      person-ms:
        condition: service_healthy
      authorization-ms:
        condition: service_healthy
    env_file:
      - ./env/bo-orc.defaults.env
      - ./env/bo-orc.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      META_DB_DATABASE_NAME: postgres
      DB_USERNAME: ${MYSQL_APPUSER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_DATABASE_NAME: boorc_db
      ROOT_DB_USERNAME: ${MYSQL_APPUSER}
      ROOT_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      SEED_USER_NAME: ${SEED_USER_NAME}
    entrypoint: ["node", "/app/node_modules/@onthebits/core/dist/src/db/orm.exec.js", "--command", "migrate:run"]

  person-ms:
    image: ghcr.io/scullyos/person-ms:0.0.64
    container_name: person-ms
    restart: unless-stopped
    networks:
      - scullyos
    depends_on:
      person-db-init:
        condition: service_completed_successfully
    env_file:
      - ./env/person.defaults.env
      - ./env/person.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      META_DB_DATABASE_NAME: postgres
      DB_USERNAME: ${MYSQL_APPUSER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_DATABASE_NAME: ${MYSQL_DATABASE}
      ROOT_DB_USERNAME: ${MYSQL_APPUSER}
      ROOT_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      SEED_USER_FIRST_NAME: ${SEED_USER_FIRST_NAME}
      SEED_USER_LAST_NAME: ${SEED_USER_LAST_NAME}
      SEED_USER_NAME: ${SEED_USER_NAME}
      SEED_USER_PROVIDER: ${SEED_USER_PROVIDER}
      BOOTSTRAP_ADMIN_PASSWORD: ${SEED_USER_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:84/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  authorization-ms:
    image: ghcr.io/scullyos/authorization-ms:0.0.56
    container_name: authorization-ms
    restart: unless-stopped
    networks:
      - scullyos
    depends_on:
      authorization-db-init:
        condition: service_completed_successfully
    env_file:
      - ./env/authorization.defaults.env
      - ./env/authorization.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      META_DB_DATABASE_NAME: postgres
      DB_USERNAME: ${MYSQL_APPUSER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_DATABASE_NAME: auth_db
      CASBIN_DB_SCHEMA: auth_db
      ROOT_DB_USERNAME: ${MYSQL_APPUSER}
      ROOT_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:81/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  bo-orc-ms:
    image: ghcr.io/scullyos/bo-orc-ms:0.0.76
    container_name: bo-orc-ms
    restart: unless-stopped
    networks:
      - scullyos
    depends_on:
      bo-orc-db-init:
        condition: service_completed_successfully
      person-ms:
        condition: service_healthy
      authorization-ms:
        condition: service_healthy
    env_file:
      - ./env/bo-orc.defaults.env
      - ./env/bo-orc.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      META_DB_DATABASE_NAME: postgres
      DB_USERNAME: ${MYSQL_APPUSER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_DATABASE_NAME: boorc_db
      ROOT_DB_USERNAME: ${MYSQL_APPUSER}
      ROOT_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      SEED_USER_NAME: ${SEED_USER_NAME}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT_BO_ORC}:8001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  scullyosapp:
    image: ghcr.io/scullyos/scullyosapp-webapp:0.0.59
    container_name: scullyosapp
    restart: unless-stopped
    networks:
      - scullyos
    depends_on:
      bo-orc-ms:
        condition: service_healthy
    env_file:
      - ./env/scullyosapp.defaults.env
      - ./env/scullyosapp.env
    environment:
      VITE_BO_ORC_MS_URL_BASE: http://${HOST_BIND:-127.0.0.1}:${HOST_PORT_BO_ORC}
      VITE_LOGGING_URL: http://${HOST_BIND:-127.0.0.1}:${HOST_PORT_KIBANA}/app/discover
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT_FRONTEND}:80"

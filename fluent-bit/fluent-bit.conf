[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Path_Key          source_path
    Parser            docker
    Tag               container.*
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# Adds container_name and container_id to each record by reading
# /var/lib/docker/containers/<id>/config.v2.json (mounted read-only on the
# fluent-bit container). Fluent Bit has no built-in docker metadata filter
# — `Name docker` references a plugin that doesn't exist — so this Lua
# filter is the docker analogue of the k8s `kubernetes` filter used by the
# gitops deployment.
[FILTER]
    Name                lua
    Match               container.*
    script              /fluent-bit/etc/enrich-docker.lua
    call                enrich_docker

# Configurable container-name allowlist. Default: ship only the three
# platform microservices. Override FLUENT_BIT_CONTAINER_INCLUDE_REGEX in
# quickstart/.env to include additional containers.
[FILTER]
    Name                grep
    Match               container.*
    Regex               container_name ${FLUENT_BIT_CONTAINER_INCLUDE_REGEX}

# Parse the JSON payload that the MS log4js logger emits as the `log`
# field. The `parser` filter merges parsed keys back onto the record.
[FILTER]
    Name                parser
    Match               container.*
    Key_Name            log
    Parser              json
    Reserve_Data        On

# Set event time from the app `timestamp` when it parses, else keep capture time.
# Decoupled from the parser above so a bad timestamp degrades event time only,
# never blanks the record.
[FILTER]
    Name                lua
    Match               container.*
    script              /fluent-bit/etc/normalize-event-time.lua
    call                normalize_event_time

# Coerce any record that did not parse into the expected structured shape so ES
# never gets a bare record; conforming records (valid `severity`) pass through.
[FILTER]
    Name                lua
    Match               container.*
    script              /fluent-bit/etc/coerce-wire-shape.lua
    call                coerce_wire_shape

[OUTPUT]
    Name                es
    Match               container.*
    Host                elasticsearch
    Port                9200
    Logstash_Format     On
    Logstash_Prefix     dev-ms-logs
    Time_Key            @timestamp
    Time_Key_Nanos      On
    Include_Tag_Key     On
    Tag_Key             tag
    Replace_Dots        On
    Generate_ID         On
    Retry_Limit         False
    Buffer_Size         10MB
    Suppress_Type_Name  On

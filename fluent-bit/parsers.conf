[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Decode_Field_As escaped_utf8 log

# App JSON: structural extraction only. No Time_Key, so a malformed/odd app
# timestamp can never fail the parse and blank the record's fields. Event time
# is set afterwards by normalize-event-time.lua (the app `timestamp` when it
# parses, capture time otherwise); the `timestamp` string stays in _source.
[PARSER]
    Name        json
    Format      json
